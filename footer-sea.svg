  <circle cx="200" cy="100" r="2" fill="#b5d9a8" opacity="0.4"/>
  <circle cx="350" cy="92" r="3" fill="#94b889" opacity="0.45"/>
  <circle cx="500" cy="102" r="2" fill="#a3cc96" opacity="0.35"/>
  <circle cx="650" cy="95" r="2.5" fill="#b5d9a8" opacity="0.5"/>
  <circle cx="780" cy="98" r="2" fill="#94b889" opacity="0.4"/>
  <circle cx="950" cy="93" r="3" fill="#a3cc96" opacity="0.45"/>
  <circle cx="1100" cy="100" r="2" fill="#b5d9a8" opacity="0.4"/>
  <circle cx="1250" cy="96" r="2.5" fill="#94b889" opacity="0.5"/>
  <circle cx="1380" cy="94" r="2" fill="#a3cc96" opacity="0.4"/>

  <circle cx="120" cy="105" r="1.5" fill="#a3cc96" opacity="0.3"/>
  <circle cx="430" cy="108" r="2" fill="#b5d9a8" opacity="0.35"/>
  <circle cx="720" cy="106" r="1.5" fill="#94b889" opacity="0.3"/>
  <circle cx="1050" cy="107" r="2" fill="#a3cc96" opacity="0.35"/>
  <circle cx="1340" cy="105" r="1.5" fill="#b5d9a8" opacity="0.3"/>
</svg>
