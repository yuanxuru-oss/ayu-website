    <path d="M8,28 Q-12,20 -20,6 Q-17,8 -10,14 Q-16,4 -13,-2 Q-10,6 -5,14 Q-9,-1 -3,-6 Q0,5 4,14 Q8,-1 12,-6 Q9,3 10,12 Q16,-1 20,-2 Q17,8 14,16 Q22,10 25,10 Q20,16 16,22" fill="#94b889"/>
