  <!-- Conifer tree 4 -->
  <g transform="translate(1030, 28)">
    <rect x="3" y="62" width="6" height="18" rx="1" fill="#6b8c63"/>
    <polygon points="6,-2 -9,23 21,23" fill="#94b889"/>
    <polygon points="6,-16 -11,15 23,15" fill="#7da073"/>
    <polygon points="6,-28 -12,6 24,6" fill="#a3cc96"/>
  </g>

  <!-- Small bush -->
  <g transform="translate(1160, 65)">
    <ellipse cx="12" cy="10" rx="16" ry="12" fill="#94b889"/>
    <ellipse cx="12" cy="10" rx="11" ry="8" fill="#a3cc96"/>
