<svg width="1440" height="80" viewBox="0 0 1440 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tree-type AC banner — compact -->

  <!-- Ground base -->
  <path d="M0 78 L1440 78 L1440 80 L0 80 Z" fill="#8faa85" opacity="0.25"/>

  <!-- Conifer tree 1 -->
  <g transform="translate(70, 25)">
    <rect x="3" y="38" width="5" height="14" rx="1" fill="#6b8c63"/>
    <polygon points="5,2 -7,18 17,18" fill="#94b889"/>
    <polygon points="5,-10 -9,12 19,12" fill="#a3cc96"/>
  </g>

  <!-- Conifer tree 2 -->
  <g transform="translate(145, 20)">
    <rect x="3" y="42" width="5" height="14" rx="1" fill="#6b8c63"/>
    <polygon points="5,-2 -8,18 18,18" fill="#94b889"/>
    <polygon points="5,-14 -10,10 20,10" fill="#a3cc96"/>
  </g>

  <!-- Deciduous tree -->
  <g transform="translate(250, 22)">
    <rect x="4" y="35" width="6" height="14" rx="1.5" fill="#6b8c63"/>
    <circle cx="7" cy="18" r="18" fill="#a3cc96"/>
    <circle cx="7" cy="18" r="14" fill="#b5d9a8"/>
