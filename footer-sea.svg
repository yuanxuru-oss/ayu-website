    <rect x="2" y="30" width="4" height="12" rx="1" fill="#6b8c63"/>
    <polygon points="4,2 -6,16 14,16" fill="#94b889"/>
    <polygon points="4,-8 -7,10 15,10" fill="#a3cc96"/>
