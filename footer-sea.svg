  <g transform="translate(810, 40)">
    <rect x="3" y="45" width="5" height="16" rx="1" fill="#6b8c63"/>
    <polygon points="5,2 -7,22 17,22" fill="#94b889"/>
    <polygon points="5,-10 -8,14 18,14" fill="#a3cc96"/>
