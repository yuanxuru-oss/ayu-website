<svg width="1440" height="120" viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tree-type AC footer banner: trees, tent, lighthouse, falling leaves in sage green -->

  <!-- Ground base -->
  <path d="M0 115 L1440 115 L1440 120 L0 120 Z" fill="#8faa85" opacity="0.3"/>

  <!-- Conifer tree 1 -->
  <g transform="translate(80, 30)">
    <rect x="3" y="60" width="6" height="20" rx="1" fill="#6b8c63"/>
    <polygon points="6,0 -8,25 20,25" fill="#94b889"/>
    <polygon points="6,-12 -10,16 22,16" fill="#7da073"/>
    <polygon points="6,-22 -12,8 24,8" fill="#a3cc96"/>
  </g>

  <!-- Conifer tree 2 -->
  <g transform="translate(160, 25)">
    <rect x="3" y="65" width="6" height="20" rx="1" fill="#6b8c63"/>
    <polygon points="6,-5 -9,22 21,22" fill="#94b889"/>
    <polygon points="6,-18 -11,14 23,14" fill="#7da073"/>
    <polygon points="6,-30 -13,6 25,6" fill="#a3cc96"/>
  </g>

  <!-- Deciduous tree -->
  <g transform="translate(280, 30)">
    <rect x="4" y="55" width="7" height="22" rx="1.5" fill="#6b8c63"/>
    <circle cx="7" cy="28" r="28" fill="#a3cc96"/>
    <circle cx="7" cy="28" r="22" fill="#b5d9a8"/>
  </g>

  <!-- Tent -->
  <g transform="translate(400, 40)">
    <polygon points="25,0 0,60 50,60" fill="#c4b998"/>
    <polygon points="25,0 0,60 0,65 -5,65 -5,60" fill="#b8a884"/>
    <polygon points="25,0 50,60 55,60 55,65 50,65" fill="#d4c9a8"/>
    <circle cx="14" cy="25" r="3" fill="#8f7d60"/>
    <circle cx="36" cy="25" r="3" fill="#8f7d60"/>
  </g>

  <!-- Lighthouse -->
  <g transform="translate(540, 10)">
    <rect x="8" y="20" width="14" height="60" rx="2" fill="#e8ddd0"/>
    <rect x="6" y="24" width="18" height="5" fill="#c44a40"/>
    <rect x="6" y="36" width="18" height="5" fill="#c44a40"/>
    <rect x="6" y="48" width="18" height="5" fill="#c44a40"/>
    <rect x="10" y="8" width="10" height="12" rx="1" fill="#3d4a38"/>
    <polygon points="15,0 -4,10 34,10" fill="#c44a40"/>
    <rect x="15" y="8" width="3" height="12" fill="#e8ddd0"/>
  </g>

  <!-- Palm tree -->
  <g transform="translate(680, 30)">
    <rect x="7" y="40" width="5" height="35" rx="1" fill="#8b7355"/>
    <path d="M9,38 Q-15,25 -25,10 Q-22,12 -15,18 Q-20,8 -18,-2 Q-14,8 -8,16 Q-12,0 -5,-8 Q-2,6 4,18 Q10,-2 16,-8 Q12,4 14,16 Q20,0 25,-2 Q22,10 18,20 Q25,14 30,10 Q25,20 18,28 Q22,30 28,32 Q20,34 12,34" fill="#94b889"/>
  </g>

