    <rect x="5" y="32" width="16" height="4" fill="#c44a40"/>
    <rect x="5" y="42" width="16" height="4" fill="#c44a40"/>
    <rect x="9" y="8" width="8" height="10" rx="1" fill="#3d4a38"/>
    <polygon points="13,0 -3,9 29,9" fill="#c44a40"/>
  </g>

  <!-- Palm tree -->
  <g transform="translate(610, 22)">
