  <!-- Deciduous tree 3 (small) -->
  <g transform="translate(1280, 45)">
    <rect x="3" y="38" width="5" height="18" rx="1" fill="#6b8c63"/>
    <circle cx="5.5" cy="18" r="18" fill="#a3cc96"/>
