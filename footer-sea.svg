  <!-- Falling leaves — subtle -->
  <circle cx="100" cy="62" r="2" fill="#a3cc96" opacity="0.4"/>
  <circle cx="310" cy="58" r="1.5" fill="#b5d9a8" opacity="0.35"/>
  <circle cx="560" cy="65" r="2" fill="#94b889" opacity="0.3"/>
  <circle cx="770" cy="60" r="1.5" fill="#a3cc96" opacity="0.4"/>
  <circle cx="980" cy="64" r="2" fill="#b5d9a8" opacity="0.35"/>
  <circle cx="1220" cy="58" r="1.5" fill="#94b889" opacity="0.3"/>
  <circle cx="1400" cy="62" r="1.5" fill="#a3cc96" opacity="0.35"/>
