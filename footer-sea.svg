  <!-- Deciduous tree 2 -->
  <g transform="translate(840, 26)">
    <rect x="3" y="32" width="5" height="14" rx="1.5" fill="#6b8c63"/>
    <circle cx="5.5" cy="16" r="16" fill="#a3cc96"/>
